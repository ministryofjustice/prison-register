server.shutdown: immediate

audit:
  endpoint.url: http://localhost:8182

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prison-register
    username: prison-register
    password: prison-register
  jpa:
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:local-public-key.pub

hmpps-auth:
  url: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
  client:
    client-id: prison-register-api-client
    client-secret: clientsecret
    access-token-uri: https://sign-in-dev.hmpps.service.justice.gov.uk/auth/oauth/token

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true